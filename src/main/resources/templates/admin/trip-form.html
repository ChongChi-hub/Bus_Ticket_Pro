<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tripDTO.id != null ? 'Sửa chuyến xe' : 'Thêm chuyến xe mới'} + ' | Bus Ticket Pro'">Trip Form | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div style="max-width:600px; margin:0 auto;">

            <div class="page-title">
                <h2 th:text="${tripDTO.id != null ? 'Chỉnh sửa chuyến xe' : 'Thêm chuyến xe mới'}"></h2>
                <p class="text-muted">Quản lý lộ trình và điều phối xe khách</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form th:action="${tripDTO.id != null ? '/admin/trips/' + tripDTO.id + '/update' : '/admin/trips'}"
                          method="post" th:object="${tripDTO}">

                        <!-- Điểm đi -->
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Điểm đi <span class="text-danger">*</span></label>
                                <select class="form-control" th:field="*{fromLocationId}"
                                        th:classappend="${#fields.hasErrors('fromLocationId')} ? ' is-invalid'">
                                    <option value="">-- Chọn điểm đi --</option>
                                    <option th:each="l : ${locations}"
                                            th:value="${l.id}"
                                            th:text="${l.name}">
                                    </option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('fromLocationId')}"
                                      th:errors="*{fromLocationId}"></span>
                            </div>

                            <!-- Điểm đến -->
                            <div class="form-group">
                                <label class="form-label">Điểm đến <span class="text-danger">*</span></label>
                                <select class="form-control" th:field="*{toLocationId}"
                                        th:classappend="${#fields.hasErrors('toLocationId')} ? ' is-invalid'">
                                    <option value="">-- Chọn điểm đến --</option>
                                    <option th:each="l : ${locations}"
                                            th:value="${l.id}"
                                            th:text="${l.name}">
                                    </option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('toLocationId')}"
                                      th:errors="*{toLocationId}"></span>
                            </div>
                        </div>

                        <!-- Khoảng cách -->
                        <div class="form-group">
                            <label class="form-label">Khoảng cách (km) <span class="text-danger">*</span></label>
                            <input type="number" step="0.1" class="form-control"
                                   th:field="*{distanceKm}"
                                   th:classappend="${#fields.hasErrors('distanceKm')} ? ' is-invalid'"
                                   placeholder="VD: 120.5" min="0.1">
                            <span class="error-text" th:if="${#fields.hasErrors('distanceKm')}"
                                  th:errors="*{distanceKm}"></span>
                        </div>

                        <!-- Xe khách -->
                        <div class="form-group">
                            <label class="form-label">Xe khách <span class="text-danger">*</span></label>
                            <select class="form-control" th:field="*{busId}"
                                    th:classappend="${#fields.hasErrors('busId')} ? ' is-invalid'">
                                <option value="">-- Chọn xe khách --</option>
                                <option th:each="b : ${buses}"
                                        th:value="${b.id}"
                                        th:text="${b.plateNumber + ' (' + b.brand + ' — ' + b.totalSeats + ' ghế — ' + (b.busType.name() == 'SEAT' ? 'Ghế ngồi' : b.busType.name() == 'SLEEPER' ? 'Giường nằm' : 'Limousine') + ')'}">
                                </option>
                            </select>
                            <span class="error-text" th:if="${#fields.hasErrors('busId')}"
                                  th:errors="*{busId}"></span>
                        </div>

                        <!-- Thời gian đi & đến -->
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Thời gian đi <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control"
                                       th:field="*{departureTime}"
                                       th:classappend="${#fields.hasErrors('departureTime')} ? ' is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('departureTime')}"
                                      th:errors="*{departureTime}"></span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Thời gian đến <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control"
                                       th:field="*{arrivalTime}"
                                       th:classappend="${#fields.hasErrors('arrivalTime')} ? ' is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('arrivalTime')}"
                                      th:errors="*{arrivalTime}"></span>
                            </div>
                        </div>

                        <!-- Giá vé -->
                        <div class="form-group">
                            <label class="form-label">Giá vé (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control"
                                   th:field="*{ticketPrice}"
                                   th:classappend="${#fields.hasErrors('ticketPrice')} ? ' is-invalid'"
                                   placeholder="VD: 150000" min="1000">
                            <span class="error-text" th:if="${#fields.hasErrors('ticketPrice')}"
                                  th:errors="*{ticketPrice}"></span>
                        </div>

                        <!-- Trạng thái (Chỉ hiện khi chỉnh sửa chuyến) -->
                        <div class="form-group" th:if="${tripDTO.id != null}">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-control" th:field="*{status}">
                                <option th:each="s : ${statuses}"
                                        th:value="${s.name()}"
                                        th:text="${s.name() == 'READY' ? 'Sẵn sàng' :
                                                   s.name() == 'RUNNING' ? 'Đang chạy' :
                                                   s.name() == 'COMPLETED' ? 'Hoàn thành' : 'Đã hủy'}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-1 mt-3">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${tripDTO.id != null ? 'Cập nhật' : 'Thêm chuyến'}">Lưu</button>
                            <a th:href="@{/admin/trips}" class="btn btn-outline">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Restrict datetime-local inputs to prevent selecting past dates
        const dateInputs = document.querySelectorAll('input[type="datetime-local"]');
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        const currentDateTime = now.toISOString().slice(0, 16);
        dateInputs.forEach(input => {
            input.setAttribute('min', currentDateTime);
        });

        // Validate locations
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            const fromLoc = document.getElementById('fromLocationId');
            const toLoc = document.getElementById('toLocationId');
            if (fromLoc && toLoc && fromLoc.value === toLoc.value && fromLoc.value !== "") {
                e.preventDefault();
                alert("Lỗi: Điểm đến không được trùng với điểm đi!");
                toLoc.focus();
            }
        });
    });
</script>
</body>
</html>
