<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${busDTO.id != null ? 'Sửa xe' : 'Thêm xe mới'} + ' | Bus Ticket Pro'">Bus Form | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div style="max-width:600px; margin:0 auto;">

            <div class="page-title">
                <h2 th:text="${busDTO.id != null ? 'Chỉnh sửa xe' : 'Thêm xe mới'}"></h2>
                <p class="text-muted">Quản lý thông tin xe khách trong hệ thống</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form th:action="${busDTO.id != null ? '/admin/buses/' + busDTO.id + '/update' : '/admin/buses'}"
                          method="post" th:object="${busDTO}">

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Biển số xe <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{plateNumber}"
                                       th:classappend="${#fields.hasErrors('plateNumber')} ? ' is-invalid'"
                                       placeholder="VD: 29B-12345"
                                       style="text-transform:uppercase">
                                <span class="error-text" th:if="${#fields.hasErrors('plateNumber')}"
                                      th:errors="*{plateNumber}"></span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Loại xe <span class="text-danger">*</span></label>
                                <select class="form-control" th:field="*{busType}"
                                        th:classappend="${#fields.hasErrors('busType')} ? ' is-invalid'">
                                    <option value="">-- Chọn loại xe --</option>
                                    <option th:each="type : ${busTypes}"
                                            th:value="${type.name()}"
                                            th:text="${type.name() == 'SEAT' ? 'Ghế ngồi' :
                                                       type.name() == 'SLEEPER' ? 'Giường nằm' : 'Limousine'}">
                                    </option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('busType')}"
                                      th:errors="*{busType}"></span>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Số ghế <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{totalSeats}"
                                       th:classappend="${#fields.hasErrors('totalSeats')} ? ' is-invalid'"
                                       th:readonly="${busDTO.id != null}"
                                       placeholder="VD: 45" min="1" max="100">
                                <span class="error-text" th:if="${#fields.hasErrors('totalSeats')}"
                                      th:errors="*{totalSeats}"></span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Hãng xe</label>
                                <input type="text" class="form-control"
                                       th:field="*{brand}"
                                       placeholder="VD: Thaco, Hyundai">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tên tài xế <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{driverName}"
                                   th:classappend="${#fields.hasErrors('driverName')} ? ' is-invalid'"
                                   placeholder="Nguyễn Văn A">
                            <span class="error-text" th:if="${#fields.hasErrors('driverName')}"
                                  th:errors="*{driverName}"></span>
                        </div>

                        <div class="form-group" th:if="${busDTO.id != null}">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-control" th:field="*{status}">
                                <option th:each="s : ${statuses}"
                                        th:value="${s.name()}"
                                        th:text="${s.name() == 'ACTIVE' ? 'Đang hoạt động' : 'Ngừng hoạt động'}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-1 mt-3">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${busDTO.id != null ? 'Cập nhật' : 'Thêm xe'}">Lưu</button>
                            <a th:href="@{/admin/buses}" class="btn btn-outline">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
