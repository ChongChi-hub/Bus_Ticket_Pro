<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chuyến xe | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

        <div class="page-header">
            <div>
                <h2>Danh sách chuyến xe</h2>
                <p class="text-muted">Quản lý và điều phối các chuyến xe khách</p>
            </div>
            <a th:href="@{/admin/trips/new}" class="btn btn-primary">Thêm chuyến mới</a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(trips)}">
            <h3>Chưa có chuyến xe nào</h3>
            <p>Hãy thêm chuyến xe đầu tiên vào hệ thống.</p>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(trips)}">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Mã chuyến</th>
                        <th>Tuyến đường</th>
                        <th>Xe khách</th>
                        <th>Thời gian đi</th>
                        <th>Thời gian đến</th>
                        <th>Giá vé</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="trip : ${trips}">
                        <td><strong th:text="${'TRIP-' + trip.id}"></strong></td>
                        <td>
                            <strong th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></strong>
                            <div class="text-muted" style="font-size: 0.8rem;" th:text="${trip.route.distanceKm + ' km'}"></div>
                        </td>
                        <td>
                            <div th:text="${trip.bus.brand}"></div>
                            <div class="text-muted" style="font-size: 0.8rem;">
                                <span th:text="${trip.bus.plateNumber}"></span> — 
                                <span th:text="${trip.bus.totalSeats + ' ghế'}"></span>
                            </div>
                        </td>
                        <td th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${trip.arrivalTime != null ? #temporals.format(trip.arrivalTime, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                        <td>
                            <strong style="color: var(--accent-dark)" th:text="${#numbers.formatDecimal(trip.ticketPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></strong>
                        </td>
                        <td>
                            <span th:switch="${trip.status.name()}">
                                <span th:case="'READY'"     class="badge badge-active">Sẵn sàng</span>
                                <span th:case="'RUNNING'"   class="badge badge-seat">Đang chạy</span>
                                <span th:case="'COMPLETED'" class="badge badge-paid">Hoàn thành</span>
                                <span th:case="'CANCELLED'" class="badge badge-inactive">Đã hủy</span>
                            </span>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/admin/trips/{id}/edit(id=${trip.id})}"
                                   class="btn btn-outline btn-sm">Sửa</a>
                                <form th:action="@{/admin/trips/{id}/delete(id=${trip.id})}"
                                      method="post"
                                      onsubmit="return confirm('Hủy chuyến xe này?')">
                                    <button type="submit" class="btn btn-danger btn-sm" th:disabled="${trip.status.name() == 'CANCELLED'}">Hủy</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
