<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý xe | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

        <div class="page-header">
            <div>
                <h2>Danh sách xe</h2>
                <p class="text-muted">Quản lý thông tin các xe khách trong hệ thống</p>
            </div>
            <a th:href="@{/admin/buses/new}" class="btn btn-primary">Thêm xe mới</a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(buses)}">
            <h3>Chưa có xe nào</h3>
            <p>Hãy thêm xe đầu tiên vào hệ thống.</p>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(buses)}">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Biển số</th>
                        <th>Loại xe</th>
                        <th>Số ghế</th>
                        <th>Hãng xe</th>
                        <th>Tài xế</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="bus : ${buses}">
                        <td><strong th:text="${bus.plateNumber}"></strong></td>
                        <td>
                            <span th:switch="${bus.busType.name()}">
                                <span th:case="'SEAT'"      class="badge badge-seat">Ghế ngồi</span>
                                <span th:case="'SLEEPER'"   class="badge badge-sleeper">Giường nằm</span>
                                <span th:case="'LIMOUSINE'" class="badge badge-limousine">Limousine</span>
                            </span>
                        </td>
                        <td th:text="${bus.totalSeats + ' ghế'}"></td>
                        <td th:text="${bus.brand != null ? bus.brand : '—'}"></td>
                        <td th:text="${bus.driverName}"></td>
                        <td>
                            <span th:switch="${bus.status.name()}">
                                <span th:case="'ACTIVE'"   class="badge badge-active">Đang hoạt động</span>
                                <span th:case="'INACTIVE'" class="badge badge-inactive">Ngừng hoạt động</span>
                            </span>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/admin/buses/{id}/edit(id=${bus.id})}"
                                   class="btn btn-outline btn-sm">Sửa</a>
                                <form th:action="@{/admin/buses/{id}/delete(id=${bus.id})}"
                                      method="post"
                                      onsubmit="return confirm('Vô hiệu hóa xe này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
