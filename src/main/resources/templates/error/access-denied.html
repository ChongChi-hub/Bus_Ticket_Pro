<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div class="empty-state" style="padding: 5rem 1rem;">
            <div style="font-size: 5rem; font-weight:900; color: var(--border); line-height:1;">403</div>
            <h3 style="font-size:1.5rem; margin: 1rem 0 0.5rem; color: var(--danger);">Truy cập bị từ chối</h3>
            <p>Bạn không có quyền truy cập vào trang này.<br>
                Vui lòng đăng nhập bằng tài khoản có đủ quyền.</p>
            <div class="d-flex gap-2 justify-between mt-3" style="justify-content:center;">
                <a th:href="@{/}" class="btn btn-primary">Về trang chủ</a>
                <a th:href="@{/login}" class="btn btn-outline">Đăng nhập lại</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
