<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nhân viên | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="page-title">
            <h2>Dashboard Nhân viên</h2>
            <p class="text-muted">Quản lý và xác nhận thanh toán vé xe</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" th:text="${pendingCount}">0</div>
                <div class="stat-label">Vé đang chờ thanh toán</div>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <h3 class="mb-2">Xử lý vé chờ thanh toán</h3>
                <p class="text-muted mb-2">Xem danh sách vé đang chờ và xác nhận thanh toán hoặc hủy vé quá hạn.</p>
                <a th:href="@{/staff/pending-tickets}" class="btn btn-primary btn-lg">Xem danh sách vé chờ</a>
            </div>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
