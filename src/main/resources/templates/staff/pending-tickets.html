<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vé chờ thanh toán | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

        <div class="page-header">
            <div class="page-title" style="margin-bottom:0; padding-bottom:0; border:none;">
                <h2>Vé chờ thanh toán</h2>
                <p class="text-muted">Xác nhận thanh toán hoặc hủy vé quá hạn</p>
            </div>
            <a th:href="@{/staff/dashboard}" class="btn btn-outline btn-sm">Quay lại Dashboard</a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(tickets)}">
            <h3>Không có vé nào đang chờ</h3>
            <p>Tất cả vé đã được xử lý.</p>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(tickets)}">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Mã vé</th>
                        <th>Hành khách</th>
                        <th>SĐT</th>
                        <th>Tuyến đường</th>
                        <th>Ngày đi</th>
                        <th>Ghế</th>
                        <th>Số tiền</th>
                        <th>Đặt lúc</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${tickets}">
                        <td style="font-family:monospace; font-size:0.78rem; font-weight:700;"
                            th:text="${t.ticketCode}"></td>
                        <td th:text="${t.customerName}"></td>
                        <td th:text="${t.phoneNumber}"></td>
                        <td th:text="${t.trip.route.fromLocation.name + ' → ' + t.trip.route.toLocation.name}"></td>
                        <td th:text="${#temporals.format(t.trip.departureTime, 'HH:mm dd/MM')}"></td>
                        <td><strong th:text="${'Ghế ' + t.seat.seatNumber}"></strong></td>
                        <td class="fw-bold"
                            th:text="${#numbers.formatDecimal(t.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}"></td>
                        <td th:text="${#temporals.format(t.bookingTime, 'HH:mm dd/MM')}"></td>
                        <td>
                            <div class="table-actions">
                                <form th:action="@{/staff/confirm-payment/{id}(id=${t.id})}"
                                      method="post">
                                    <button type="submit" class="btn btn-success btn-sm">Xác nhận TT</button>
                                </form>
                                <form th:action="@{/staff/cancel-ticket/{id}(id=${t.id})}"
                                      method="post"
                                      onsubmit="return confirm('Hủy vé này?')">
                                    <button type="submit" class="btn btn-danger btn-sm">Hủy vé</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
