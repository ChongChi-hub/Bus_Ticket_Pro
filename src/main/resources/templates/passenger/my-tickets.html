<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vé của tôi | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div class="page-title">
            <h2>Vé của tôi</h2>
            <p class="text-muted">Lịch sử đặt vé của tài khoản</p>
        </div>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="empty-state" th:if="${#lists.isEmpty(tickets)}">
            <h3>Chưa có vé nào</h3>
            <p>Bạn chưa đặt vé nào. Hãy tìm chuyến xe và đặt vé ngay!</p>
            <a th:href="@{/}" class="btn btn-primary mt-2">Tìm chuyến xe</a>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(tickets)}">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Mã vé</th>
                        <th>Tuyến đường</th>
                        <th>Ngày đi</th>
                        <th>Ghế</th>
                        <th>Giá tiền</th>
                        <th>Trạng thái</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${tickets}">
                        <td style="font-family:monospace; font-weight:700; font-size:0.8rem;"
                            th:text="${t.ticketCode}"></td>
                        <td th:text="${t.trip.route.fromLocation.name + ' → ' + t.trip.route.toLocation.name}"></td>
                        <td th:text="${#temporals.format(t.trip.departureTime, 'HH:mm dd/MM/yyyy')}"></td>
                        <td><strong th:text="${'Ghế ' + t.seat.seatNumber}"></strong></td>
                        <td th:text="${#numbers.formatDecimal(t.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}"></td>
                        <td>
                            <span th:switch="${t.status.name()}">
                                <span th:case="'PENDING'"   class="badge badge-pending">Chờ TT</span>
                                <span th:case="'PAID'"      class="badge badge-paid">Đã TT</span>
                                <span th:case="'CANCELLED'" class="badge badge-cancelled">Đã hủy</span>
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/tickets/{code}(code=${t.ticketCode}, phone=${t.phoneNumber})}"
                               class="btn btn-outline btn-sm">Xem</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
