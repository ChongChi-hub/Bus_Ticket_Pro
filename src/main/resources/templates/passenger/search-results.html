<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<!-- Search Bar (compact) -->
<div style="background: var(--primary); padding: 1.25rem 0;">
    <div class="container">
        <form th:action="@{/search}" method="get" th:object="${searchDTO}">
            <div class="search-grid" style="max-width:100%">
                <div>
                    <select class="form-control" th:field="*{fromLocationId}">
                        <option value="">-- Điểm đi --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                    </select>
                </div>
                <div>
                    <select class="form-control" th:field="*{toLocationId}">
                        <option value="">-- Điểm đến --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                    </select>
                </div>
                <div>
                    <input type="date" class="form-control" th:field="*{departureDate}">
                </div>
                <button type="submit" class="btn btn-accent">Tìm lại</button>
            </div>
        </form>
    </div>
</div>

<div class="main-content">
    <div class="container">
        <div class="page-title">
            <h2>Chuyến xe phù hợp</h2>
            <p class="text-muted" th:if="${trips != null}"
               th:text="'Tìm thấy ' + ${#lists.size(trips)} + ' chuyến xe'"></p>
        </div>

        <!-- No results -->
        <div class="empty-state" th:if="${trips == null or #lists.isEmpty(trips)}">
            <h3>Không tìm thấy chuyến xe</h3>
            <p>Vui lòng chọn tuyến đường và ngày đi khác.</p>
            <a th:href="@{/}" class="btn btn-primary mt-2">Quay lại trang chủ</a>
        </div>

        <!-- Trip list -->
        <div th:each="trip : ${trips}" class="trip-card">
            <div class="trip-route">
                <span class="trip-city" th:text="${trip.fromLocation}"></span>
                <span class="trip-arrow">→</span>
                <span class="trip-city" th:text="${trip.toLocation}"></span>
            </div>

            <div class="trip-date">
                <span th:text="${#temporals.format(trip.departureTime, 'HH:mm dd/MM/yyyy')}"></span>
                <span th:if="${trip.arrivalTime != null}">
                    &nbsp;→&nbsp;<span th:text="${#temporals.format(trip.arrivalTime, 'HH:mm dd/MM/yyyy')}"></span>
                </span>
            </div>

            <div class="trip-meta">
                <span>Loại xe: <strong th:text="${trip.busType}"></strong></span>
                <span th:if="${trip.brand != null}">Hãng xe: <strong th:text="${trip.brand}"></strong></span>
                <span>Tài xế: <strong th:text="${trip.driverName}"></strong></span>
                <span>Biển số: <strong th:text="${trip.plateNumber}"></strong></span>
                <span>Quãng đường: <strong th:text="${trip.distanceKm + ' km'}"></strong></span>
            </div>

            <div class="trip-footer">
                <div>
                    <div class="trip-price"
                         th:text="${#numbers.formatDecimal(trip.ticketPrice, 0, 'POINT', 0, 'COMMA') + ' đ'}"></div>
                    <div class="trip-avail">
                        Còn trống: <strong th:text="${trip.availableSeats} + ' ghế'"></strong>
                    </div>
                </div>
                <a th:href="@{/trips/{id}/seats(id=${trip.id})}"
                   class="btn btn-primary"
                   th:classappend="${trip.availableSeats == 0 ? ' btn-outline' : ''}">
                    <span th:if="${trip.availableSeats > 0}">Chọn ghế</span>
                    <span th:if="${trip.availableSeats == 0}">Hết chỗ</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Restrict date inputs to prevent selecting past dates
        const dateInputs = document.querySelectorAll('input[type="date"]');
        const today = new Date().toISOString().split('T')[0];
        dateInputs.forEach(input => {
            input.setAttribute('min', today);
        });

        // Validate locations
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function(e) {
                const fromLoc = document.getElementById('fromLocationId');
                const toLoc = document.getElementById('toLocationId');
                if (fromLoc && toLoc && fromLoc.value === toLoc.value && fromLoc.value !== "") {
                    e.preventDefault();
                    alert("Lỗi: Điểm đến không được trùng với điểm đi!");
                    toLoc.focus();
                }
            });
        }
    });
</script>
</body>
</html>
