<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết vé | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        @media print {
            .navbar, footer, .no-print { display: none !important; }
            body { background: white; }
            .ticket-card { box-shadow: none; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">

        <div class="ticket-card" th:if="${ticket != null}">

            <!-- Ticket Header -->
            <div class="ticket-header">
                <p style="opacity:0.7; font-size:0.82rem; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:1px;">Mã vé</p>
                <div class="ticket-code" th:text="${ticket.ticketCode}"></div>

                <div style="margin-top:1rem;">
                    <span class="ticket-status-badge"
                          th:classappend="${ticket.status.name() == 'PAID'      ? 'badge-paid'   :
                                           ticket.status.name() == 'PENDING'   ? 'badge-pending' :
                                           'badge-cancelled'}"
                          th:text="${ticket.status.name() == 'PAID'      ? 'Đã thanh toán' :
                                     ticket.status.name() == 'PENDING'   ? 'Chờ thanh toán' :
                                     'Đã hủy'}"
                          style="background:rgba(255,255,255,0.2); color:white;">
                    </span>
                </div>
            </div>

            <!-- Route -->
            <div class="ticket-body">
                <div class="ticket-route">
                    <span class="ticket-city" th:text="${ticket.fromLocation}"></span>
                    <span class="ticket-arrow" style="flex:1; text-align:center;">→</span>
                    <span class="ticket-city" th:text="${ticket.toLocation}"></span>
                </div>

                <div class="ticket-row">
                    <span class="ticket-label">Giờ khởi hành</span>
                    <span class="ticket-value"
                          th:text="${#temporals.format(ticket.departureTime, 'HH:mm — dd/MM/yyyy')}"></span>
                </div>
                <div class="ticket-row" th:if="${ticket.arrivalTime != null}">
                    <span class="ticket-label">Dự kiến đến</span>
                    <span class="ticket-value"
                          th:text="${#temporals.format(ticket.arrivalTime, 'HH:mm — dd/MM/yyyy')}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Ghế</span>
                    <span class="ticket-value" style="font-size:1.1rem; color:var(--primary);"
                          th:text="'Ghế ' + ${ticket.seatNumber}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Loại xe</span>
                    <span class="ticket-value" th:text="${ticket.busType}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Biển số xe</span>
                    <span class="ticket-value" th:text="${ticket.plateNumber}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Tài xế</span>
                    <span class="ticket-value" th:text="${ticket.driverName}"></span>
                </div>

                <hr class="ticket-divider" style="margin: 1rem 0;">

                <div class="ticket-row">
                    <span class="ticket-label">Họ tên hành khách</span>
                    <span class="ticket-value" th:text="${ticket.customerName}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Số điện thoại</span>
                    <span class="ticket-value" th:text="${ticket.phoneNumber}"></span>
                </div>
                <div class="ticket-row" th:if="${ticket.email != null}">
                    <span class="ticket-label">Email</span>
                    <span class="ticket-value" th:text="${ticket.email}"></span>
                </div>
                <div class="ticket-row">
                    <span class="ticket-label">Thời gian đặt</span>
                    <span class="ticket-value"
                          th:text="${#temporals.format(ticket.bookingTime, 'HH:mm dd/MM/yyyy')}"></span>
                </div>
                <div class="ticket-row" th:if="${ticket.paidAt != null}">
                    <span class="ticket-label">Thanh toán lúc</span>
                    <span class="ticket-value"
                          th:text="${#temporals.format(ticket.paidAt, 'HH:mm dd/MM/yyyy')}"></span>
                </div>
                <div class="ticket-row" style="border-bottom:none; padding-top:1rem;">
                    <span class="ticket-label" style="font-size:1rem; font-weight:700;">Tổng tiền</span>
                    <span class="ticket-amount"
                          th:text="${#numbers.formatDecimal(ticket.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}"></span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="text-center mt-3 no-print" th:if="${ticket != null}">
            <!-- Cancel button (only PENDING tickets) -->
            <form th:if="${ticket.status.name() == 'PENDING'}"
                  th:action="@{/cancel-ticket}" method="post"
                  style="display:inline;"
                  onsubmit="return confirm('Bạn có chắc muốn hủy vé này?')">
                <input type="hidden" name="ticketId"    th:value="${ticket.ticketId}">
                <input type="hidden" name="phoneNumber" th:value="${ticket.phoneNumber}">
                <button type="submit" class="btn btn-danger">Hủy vé</button>
            </form>

            <button onclick="window.print()" class="btn btn-outline">In vé</button>
            <a th:href="@{/tickets/lookup}" class="btn btn-outline">Tra cứu vé khác</a>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
