<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div style="max-width: 600px; margin: 0 auto;">

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

            <div class="page-title">
                <h2>Hồ sơ cá nhân</h2>
                <p class="text-muted">Xem và cập nhật thông tin cá nhân của bạn</p>
            </div>

            <div class="card">
                <div class="card-header">Thông tin tài khoản</div>
                <div class="card-body">
                    <form th:action="@{/profile/update}" method="post" th:object="${profileDTO}">

                        <!-- Thông tin không chỉnh sửa được -->
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" class="form-control" th:value="${username}" readonly>
                                <span class="form-hint">Tên đăng nhập không thể thay đổi</span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Vai trò tài khoản</label>
                                <div style="margin-top: 0.25rem;">
                                    <span th:switch="${role}">
                                        <span th:case="'ADMIN'"     class="badge badge-seat">QUẢN TRỊ VIÊN</span>
                                        <span th:case="'STAFF'"     class="badge badge-pending">NHÂN VIÊN</span>
                                        <span th:case="'PASSENGER'" class="badge badge-active">HÀNH KHÁCH</span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Các thông tin cho phép chỉnh sửa -->
                        <div class="form-group">
                            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'"
                                   placeholder="Nhập họ và tên đầy đủ">
                            <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                                  th:errors="*{fullName}"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{phoneNumber}"
                                   th:classappend="${#fields.hasErrors('phoneNumber')} ? ' is-invalid'"
                                   placeholder="Nhập số điện thoại liên hệ">
                            <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                                  th:errors="*{phoneNumber}"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Địa chỉ Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                                   placeholder="Nhập địa chỉ email cá nhân (Ví dụ: name@gmail.com)">
                            <span class="error-text" th:if="${#fields.hasErrors('email')}"
                                  th:errors="*{email}"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Địa chỉ liên hệ</label>
                            <input type="text" class="form-control" th:field="*{address}"
                                   th:classappend="${#fields.hasErrors('address')} ? ' is-invalid'"
                                   placeholder="Nhập địa chỉ nơi ở hiện tại">
                            <span class="error-text" th:if="${#fields.hasErrors('address')}"
                                  th:errors="*{address}"></span>
                        </div>

                        <div class="d-flex gap-1 mt-3">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            <a th:href="@{/}" class="btn btn-outline">Quay lại trang chủ</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
