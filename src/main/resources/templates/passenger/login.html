<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h2>BUS TICKET PRO</h2>
            <p class="subtitle">Đăng nhập vào tài khoản của bạn</p>
        </div>

        <div class="alert alert-danger"
             th:if="${param.error}"
             th:text="'Tên đăng nhập hoặc mật khẩu không đúng'"></div>
        <div class="alert alert-success"
             th:if="${param.logout}"
             th:text="'Đã đăng xuất thành công'"></div>
        <div class="alert alert-success"
             th:if="${successMessage}"
             th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="Nhập tên đăng nhập"
                       autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="Nhập mật khẩu"
                       required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Đăng nhập</button>
        </form>

        <div class="auth-footer">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
