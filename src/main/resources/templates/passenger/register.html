<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-logo">
            <h2>Tạo tài khoản</h2>
            <p class="subtitle">Đăng ký để quản lý vé của bạn dễ dàng hơn</p>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${registerDTO}">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập <span class="text-danger">*</span></label>
                    <input type="text" id="username" class="form-control"
                           th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                           placeholder="Tối thiểu 3 ký tự">
                    <span class="error-text" th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu <span class="text-danger">*</span></label>
                    <input type="password" id="password" class="form-control"
                           th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                           placeholder="Tối thiểu 6 ký tự">
                    <span class="error-text" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="fullName">Họ và tên <span class="text-danger">*</span></label>
                <input type="text" id="fullName" class="form-control"
                       th:field="*{fullName}"
                       th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'"
                       placeholder="Nguyễn Văn A">
                <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                      th:errors="*{fullName}"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="phoneNumber">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="tel" id="phoneNumber" class="form-control"
                           th:field="*{phoneNumber}"
                           th:classappend="${#fields.hasErrors('phoneNumber')} ? ' is-invalid'"
                           placeholder="0901234567">
                    <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                          th:errors="*{phoneNumber}"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control"
                           th:field="*{email}"
                           placeholder="example@gmail.com">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">Tạo tài khoản</button>
        </form>

        <div class="auth-footer">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
