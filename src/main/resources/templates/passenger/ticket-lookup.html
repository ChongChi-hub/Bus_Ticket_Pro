<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu vé | Bus Ticket Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="container">
        <div style="max-width: 480px; margin: 0 auto;">

            <div class="page-title text-center">
                <h2>Tra cứu vé</h2>
                <p class="text-muted">Nhập mã vé và số điện thoại để xem thông tin chi tiết</p>
            </div>

            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/tickets/lookup}" method="get">
                        <div class="form-group">
                            <label class="form-label">Mã vé</label>
                            <input type="text" name="code" class="form-control"
                                   placeholder="VD: BTP260520145532123"
                                   required style="text-transform:uppercase; letter-spacing:1px;">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số điện thoại đặt vé</label>
                            <input type="tel" name="phone" class="form-control"
                                   placeholder="0901234567" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Tra cứu</button>
                    </form>
                </div>
            </div>

            <p class="text-center text-muted mt-2" style="font-size:0.875rem;">
                Mã vé được gửi sau khi đặt vé thành công.
                <a th:href="@{/}">Đặt vé mới</a>
            </p>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    // Support GET form for ticket lookup
    const form = document.querySelector('form[action*="lookup"]');
    if (form && form.method === 'get') {
        form.addEventListener('submit', function(e) {
            const code  = this.querySelector('[name=code]').value.trim().toUpperCase();
            const phone = this.querySelector('[name=phone]').value.trim();
            if (code && phone) {
                e.preventDefault();
                window.location.href = '/tickets/' + encodeURIComponent(code) + '?phone=' + encodeURIComponent(phone);
            }
        });
    }
</script>
</body>
</html>
